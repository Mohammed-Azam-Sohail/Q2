name: Node.js CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm cahce
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: hashFiles('package-lock.json')

      - name: install dep
        run: npm ci
        with:
          key: hashFiles('package-lock.json')
      - name: npm test
        run: npm test
      - name: npm build
        run: npm run build
